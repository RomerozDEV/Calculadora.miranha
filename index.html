<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora Spider-Verse 🕷️🕸️</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Bebas+Neue&display=swap');
        
        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Orbitron', monospace;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            position: relative;
            padding: 20px;
        }

        .bg-spider {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                url('https://ingresso-a.akamaihd.net/b2b/production/uploads/article/image/3194/9f4b48f1e24380a6c549f06437c208aa.jpg') center/cover,
                radial-gradient(circle at 20% 80%, rgba(120,119,198,0.2) 0%, transparent 50%),
                linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 70%, #000 100%);
            filter: brightness(0.4) contrast(1.2);
            z-index: 1;
        }

        .web-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2;
        }

        .spider {
            position: absolute;
            font-size: 35px;
            animation: swing 5s ease-in-out infinite;
            z-index: 3;
            filter: drop-shadow(0 0 15px currentColor);
        }
        .spider:nth-child(1) { top: 15%; left: 8%; color: #c81010; animation-delay: 0s; }
        .spider:nth-child(2) { top: 65%; right: 12%; color: #ffaa00; animation-delay: -1.5s; }
        .spider:nth-child(3) { top: 35%; right: 8%; color: #00ff88; animation-delay: -2.5s; }

        @keyframes swing {
            0%, 100% { transform: translateX(0) rotate(3deg); }
            50% { transform: translateX(40px) rotate(-3deg); }
        }

        .spider-switch {
            position: fixed;
            top: 25px;
            right: 25px;
            z-index: 20;
            display: flex;
            gap: 12px;
        }

        .spider-mode {
            background: rgba(0,0,0,0.8);
            border: 2px solid #ffd700;
            color: #ffd700;
            padding: 12px 22px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1rem;
            transition: all 0.4s ease;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            backdrop-filter: blur(10px);
        }

        .spider-mode.active {
            background: linear-gradient(45deg, #c81010, #ffd700);
            box-shadow: 0 0 25px rgba(200,16,16,0.6);
            transform: scale(1.05);
        }

        .spider-mode:hover { transform: scale(1.08); }

        /* CORRIGIDO: Padding ajustado + largura perfeita */
        .calculator {
            backdrop-filter: blur(30px);
            border-radius: 35px;
            padding: 25px;  /* ← REDUZIDO */
            width: 420px;   /* ← LARGURA IDEAL */
            position: relative;
            z-index: 10;
            box-shadow: 
                0 35px 70px rgba(0,0,0,0.7),
                inset 0 1px 0 rgba(255,255,255,0.1);
        }

        .calculator.peter {
            background: linear-gradient(145deg, #1e0b0b 0%, #0a0f1f 50%, #1a0505 100%);
            border: 3px solid #c81010;
        }
        .peter .display { border-color: #c81010; }
        .peter .title { 
            background: linear-gradient(90deg, #c81010, #ffd700, #1e40af);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .calculator.miles {
            background: linear-gradient(145deg, #0f0f23 0%, #1a0f1a 50%, #000 100%);
            border: 3px solid #ffaa00;
        }
        .miles .display { border-color: #ffaa00; }
        .miles .title { 
            background: linear-gradient(90deg, #ffaa00, #ffd700, #ff6b35);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .calculator::before {
            content: '🕸️';
            position: absolute;
            top: 15px;
            right: 25px;
            font-size: 28px;
            opacity: 0.7;
            filter: drop-shadow(0 0 10px);
            animation: webFloat 3s ease-in-out infinite;
        }

        @keyframes webFloat {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-5px) rotate(5deg); }
        }

        .header { text-align: center; margin-bottom: 20px; }
        .title {
            font-family: 'Bebas Neue', sans-serif;
            font-size: 1.9rem;
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 3px;
            font-weight: 900;
        }

        .display {
            background: rgba(0,0,0,0.9);
            border: 3px solid;
            border-radius: 25px;
            padding: 22px;
            margin-bottom: 20px;
            font-size: 2.4rem;
            text-align: right;
            min-height: 85px;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            word-break: break-all;
            box-shadow: inset 0 10px 25px rgba(0,0,0,0.8);
            color: #00ff88;
            font-weight: 900;
        }

        /* GRID PERFEITO - SEM SAIR DOS LIMITES */
        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 14px;  /* ← GAP REDUZIDO */
            width: 100%;
        }

        button {
            height: 64px;  /* ← ALTURA REDUZIDA */
            border: none;
            border-radius: 20px;
            font-size: 1.2rem;
            font-weight: bold;
            font-family: inherit;
            cursor: pointer;
            transition: all 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            position: relative;
            overflow: hidden;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            width: 0;
            height: 0;
            background: rgba(255,255,255,0.4);
            border-radius: 50%;
            transform: translate(-50%, -50%);
            transition: width 0.6s, height 0.6s;
        }

        button:active::before { width: 300px; height: 300px; }

        .num { 
            background: rgba(60,60,80,0.9); 
            color: #fff; 
            border: 2px solid rgba(255,255,255,0.2);
        }
        .num:hover { 
            background: rgba(120,120,140,0.95); 
            transform: translateY(-3px) scale(1.02);
        }

        .op { 
            background: rgba(255,215,0,0.3); 
            color: #ffd700; 
            border: 3px solid rgba(255,215,0,0.7);
            font-size: 1.35rem;
        }
        .op:hover { 
            background: rgba(255,215,0,0.5); 
            transform: translateY(-3px);
        }

        .func { 
            background: rgba(0,150,255,0.3); 
            color: #00aaff; 
            border: 3px solid rgba(0,150,255,0.7);
            font-size: 0.85rem;
        }
        .func:hover { 
            background: rgba(0,150,255,0.5); 
            transform: translateY(-3px);
        }

        .ctrl { 
            background: rgba(200,20,20,0.4); 
            color: #ff4444; 
            border: 3px solid rgba(200,20,20,0.8);
            font-size: 1.1rem;
        }
        .ctrl:hover { 
            background: rgba(200,20,20,0.6); 
            transform: translateY(-3px);
        }

        .equals { 
            grid-column: 1 / -1;
            background: linear-gradient(145deg, #c81010, #1e40af); 
            color: white; 
            font-size: 1.75rem;
            border: 4px solid #ffd700;
            height: 70px;  /* ← = MAIOR */
            margin-top: 6px;
        }
        .equals:hover { 
            background: linear-gradient(145deg, #1e40af, #c81010);
            transform: translateY(-5px) scale(1.05);
            box-shadow: 0 20px 40px rgba(200,16,16,0.7);
        }

        @media (max-width: 480px) {
            body { padding: 10px; }
            .calculator { 
                width: 95vw;
                max-width: 400px;
                padding: 20px;
            }
            .buttons { gap: 10px; }
            button { height: 58px; font-size: 1.1rem; }
            .equals { height: 64px; }
        }
    </style>
</head>
<body>
    <div class="bg-spider"></div>
    <canvas class="web-bg" id="web-bg"></canvas>
    
    <div class="spider-switch">
        <button class="spider-mode active" onclick="switchMode('peter')" id="peter-btn">
            🕸️ Peter
        </button>
        <button class="spider-mode" onclick="switchMode('miles')" id="miles-btn">
            ⚡️ Miles
        </button>
    </div>

    <div class="spider">🕷️</div>
    <div class="spider">🕷️</div>
    <div class="spider">🕷️</div>

    <div class="calculator peter" id="calculator">
        <div class="header">
            <div class="title">Spider-Verse Calculator</div>
        </div>
        
        <div class="display" id="display">0</div>
        
        <div class="buttons">
            <button class="ctrl" onclick="clearAll()">C</button>
            <button class="ctrl" onclick="deleteLast()">CE</button>
            <button class="func" onclick="input('sin(')">sin</button>
            <button class="func" onclick="input('cos(')">cos</button>
            
            <button class="func" onclick="input('tan(')">tan</button>
            <button class="func" onclick="input('log(')">log</button>
            <button class="func" onclick="input('ln(')">ln</button>
            <button class="op" onclick="input('/')">÷</button>
            
            <button class="func" onclick="input('√(')">√</button>
            <button class="func" onclick="input('^')">x²</button>
            <button class="num" onclick="input('7')">7</button>
            <button class="num" onclick="input('8')">8</button>
            
            <button class="num" onclick="input('9')">9</button>
            <button class="op" onclick="input('*')">×</button>
            <button class="num" onclick="input('4')">4</button>
            <button class="num" onclick="input('5')">5</button>
            
            <button class="num" onclick="input('6')">6</button>
            <button class="op" onclick="input('-')">-</button>
            <button class="num" onclick="input('1')">1</button>
            <button class="num" onclick="input('2')">2</button>
            
            <button class="num" onclick="input('3')">3</button>
            <button class="op" onclick="input('+')">+</button>
            <button class="num" style="grid-column: span 2;" onclick="input('0')">0</button>
            <button class="num" onclick="input('.')">.</button>
            
            <button class="equals" onclick="calculate()">=</button>
        </div>
    </div>

    <script>
        let display = document.getElementById('display');
        let currentInput = '0';

        function updateDisplay() { display.textContent = currentInput || '0'; }
        function input(value) {
            if (currentInput === '0' && value !== '.') currentInput = value;
            else currentInput += value;
            updateDisplay();
        }
        function clearAll() { currentInput = '0'; updateDisplay(); }
        function deleteLast() { currentInput = currentInput.slice(0, -1) || '0'; updateDisplay(); }
        
        function toRad(deg) { return deg * Math.PI / 180; }
        
        function calculate() {
            try {
                let expression = currentInput
                    .replace(/×/g, '*').replace(/÷/g, '/').replace(/\^/g, '**')
                    .replace(/√\(/g, 'Math.sqrt(').replace(/ln\(/g, 'Math.log(')
                    .replace(/log\(/g, 'Math.log10(');
                
                expression = expression.replace(/sin\(([^\)]+)\)/g, (m, a) => 
                    Math.sin(toRad(eval(a))).toString());
                expression = expression.replace(/cos\(([^\)]+)\)/g, (m, a) => 
                    Math.cos(toRad(eval(a))).toString());
                expression = expression.replace(/tan\(([^\)]+)\)/g, (m, a) => 
                    Math.tan(toRad(eval(a))).toString());
                
                let result = eval(expression);
                currentInput = isFinite(result) ? parseFloat(result.toFixed(10)).toString().slice(0, 12) : 'Erro';
            } catch { currentInput = 'Erro'; }
            updateDisplay();
        }

        function switchMode(mode) {
            document.getElementById('calculator').className = `calculator ${mode}`;
            document.getElementById('peter-btn').classList.toggle('active', mode === 'peter');
            document.getElementById('miles-btn').classList.toggle('active', mode === 'miles');
        }

        const canvas = document.getElementById('web-bg');
        const ctx = canvas.getContext('2d');
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
        
        function drawWeb() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.strokeStyle = 'rgba(255,215,0,0.1)';
            ctx.lineWidth = 2;
            const cx = canvas.width/2, cy = canvas.height/2;
            for (let i = 0; i < 10; i++) {
                ctx.beginPath();
                ctx.moveTo(cx, cy);
                const angle = (i/10)*Math.PI*2;
                ctx.lineTo(cx + Math.cos(angle)*450, cy + Math.sin(angle)*450);
                ctx.stroke();
            }
            requestAnimationFrame(drawWeb);
        }
        drawWeb();

        window.addEventListener('resize', () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        });

        updateDisplay();
    </script>
</body>
</html>
